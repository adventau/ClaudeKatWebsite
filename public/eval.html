<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0c0c0c;
      font-family: 'Courier New', Courier, monospace;
      color: #c8c8c8;
      display: flex;
      flex-direction: column;
    }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .auth-box {
      background: #111; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 48px 40px; width: 460px; max-width: 90vw; text-align: center;
    }
    .auth-box h1 { font-size: 22px; color: #00ff88; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
    .auth-box .sub { font-size: 13px; color: #555; margin-bottom: 32px; letter-spacing: 0.06em; }
    .auth-input {
      width: 100%; padding: 14px 18px; background: #0a0a0a; border: 1px solid #333;
      color: #00ff88; font-family: inherit; font-size: 18px; border-radius: 6px;
      outline: none; text-align: center; letter-spacing: 0.15em;
    }
    .auth-input:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0,255,136,0.15); }
    .auth-input::placeholder { color: #2a2a2a; }
    .auth-err { color: #ff4444; font-size: 13px; margin-top: 12px; min-height: 18px; }

    /* ── Terminal ── */
    #terminal-screen { display: none; flex-direction: column; height: 100vh; }
    .term-header {
      background: #111; border-bottom: 1px solid #1a1a1a;
      padding: 8px 16px; display: flex; align-items: center; gap: 12px;
      font-size: 11px; color: #555; flex-shrink: 0;
    }
    .term-header .title { color: #00ff88; font-weight: bold; letter-spacing: 0.1em; }
    .term-header .sep { color: #333; }
    .term-header .mode-badge {
      padding: 2px 8px; border-radius: 3px; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .badge-normal { background: rgba(0,255,136,0.1); color: #00ff88; }
    .badge-edit { background: rgba(255,170,0,0.15); color: #ffaa00; }
    .badge-preview { background: rgba(100,100,255,0.15); color: #8888ff; }
    .badge-maint { background: rgba(255,50,50,0.15); color: #ff4444; }
    .badge-browse { background: rgba(0,200,255,0.15); color: #00ccff; }

    .term-output {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      font-size: 12px; line-height: 1.6;
    }
    .term-output::-webkit-scrollbar { width: 6px; }
    .term-output::-webkit-scrollbar-track { background: #0c0c0c; }
    .term-output::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

    .line { white-space: pre-wrap; word-break: break-all; }
    .line-info { color: #888; }
    .line-success { color: #00ff88; }
    .line-error { color: #ff4444; }
    .line-warn { color: #ffaa00; }
    .line-cmd { color: #00aaff; }
    .line-header { color: #00ff88; font-weight: bold; }
    .line-dim { color: #444; }
    .line-highlight { color: #c084fc; }
    .line-data { color: #66ccff; }

    .term-input-wrap {
      flex-shrink: 0; position: relative;
      background: #111; border-top: 1px solid #1a1a1a;
    }
    .term-input-row {
      display: flex; align-items: center; padding: 8px 16px;
    }
    .prompt { color: #00ff88; margin-right: 8px; font-size: 13px; white-space: nowrap; }
    .term-input {
      flex: 1; background: transparent; border: none; color: #c8c8c8;
      font-family: inherit; font-size: 13px; outline: none;
    }
    .term-input::placeholder { color: #333; }

    /* ── Autocomplete dropdown ── */
    .ac-dropdown {
      display: none; position: absolute; bottom: 100%; left: 0; right: 0;
      background: #151515; border: 1px solid #2a2a2a; border-bottom: none;
      max-height: 260px; overflow-y: auto;
    }
    .ac-dropdown.open { display: block; }
    .ac-dropdown::-webkit-scrollbar { width: 5px; }
    .ac-dropdown::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .ac-item {
      padding: 6px 16px; cursor: pointer; display: flex; align-items: baseline; gap: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    .ac-item:hover, .ac-item.selected { background: #1e1e1e; }
    .ac-item.selected { border-left: 2px solid #00ff88; }
    .ac-cmd { color: #00ff88; font-size: 12px; white-space: nowrap; min-width: 200px; }
    .ac-desc { color: #555; font-size: 10px; }
    .ac-cat {
      padding: 4px 16px; font-size: 9px; color: #444; text-transform: uppercase;
      letter-spacing: 0.1em; background: #111; border-bottom: 1px solid #1a1a1a;
      pointer-events: none;
    }

    /* ── Edit mode message list ── */
    .msg-item {
      background: #111; border: 1px solid #1a1a1a; border-radius: 4px;
      padding: 8px 12px; margin: 4px 0; display: flex; align-items: flex-start; gap: 10px;
    }
    .msg-item:hover { border-color: #333; }
    .msg-meta { font-size: 10px; color: #555; white-space: nowrap; }
    .msg-sender { font-size: 11px; font-weight: bold; }
    .msg-sender.kaliph { color: #7c3aed; }
    .msg-sender.kathrine { color: #c084fc; }
    .msg-sender.ai { color: #00aaff; }
    .msg-text { font-size: 11px; color: #aaa; flex: 1; }
    .msg-del-btn {
      background: rgba(255,50,50,0.1); border: 1px solid #551111; color: #ff4444;
      font-family: inherit; font-size: 9px; padding: 3px 8px; border-radius: 3px;
      cursor: pointer; white-space: nowrap; text-transform: uppercase;
    }
    .msg-del-btn:hover { background: rgba(255,50,50,0.25); }

    /* ── Table ── */
    .eval-table { width: 100%; border-collapse: collapse; margin: 6px 0; }
    .eval-table th, .eval-table td {
      text-align: left; padding: 3px 10px; font-size: 11px; border-bottom: 1px solid #1a1a1a;
    }
    .eval-table th { color: #00ff88; font-size: 10px; text-transform: uppercase; }
    .eval-table td { color: #aaa; }

    /* ── Settings gear button ── */
    .settings-btn {
      margin-left: auto; background: none; border: none; color: #444;
      cursor: pointer; font-size: 14px; padding: 2px 6px; transition: color 0.2s;
    }
    .settings-btn:hover { color: #888; }

    /* ── Settings modal ── */
    .settings-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; align-items: center; justify-content: center;
    }
    .settings-overlay.open { display: flex; }
    .settings-panel {
      background: #111; border: 1px solid #2a2a2a; border-radius: 6px;
      width: 380px; max-height: 80vh; overflow-y: auto; padding: 0;
    }
    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid #1a1a1a;
    }
    .settings-header h2 {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--accent); margin: 0;
    }
    .settings-close {
      background: none; border: none; color: #555; font-size: 16px;
      cursor: pointer; padding: 0 4px;
    }
    .settings-close:hover { color: #aaa; }
    .settings-body { padding: 16px 18px; }
    .settings-section {
      margin-bottom: 18px;
    }
    .settings-section-title {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #555; margin-bottom: 10px;
    }

    /* Theme cards */
    .theme-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    }
    .theme-card {
      background: #0a0a0a; border: 2px solid #1a1a1a; border-radius: 5px;
      padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .theme-card:hover { border-color: #333; }
    .theme-card.active { border-color: var(--accent); }
    .theme-card-preview {
      height: 32px; border-radius: 3px; margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-family: inherit;
    }
    .theme-card-name { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }

    /* Setting rows */
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #111;
    }
    .setting-label { font-size: 11px; color: #888; }
    .setting-control { display: flex; align-items: center; gap: 8px; }

    /* Toggle switch */
    .toggle {
      width: 34px; height: 18px; background: #222; border-radius: 9px;
      position: relative; cursor: pointer; transition: background 0.2s;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; background: #ccc; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(16px); }

    /* Font size stepper */
    .stepper {
      display: flex; align-items: center; gap: 6px;
    }
    .stepper button {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #888;
      width: 22px; height: 22px; border-radius: 3px; cursor: pointer;
      font-family: inherit; font-size: 12px; display: flex; align-items: center; justify-content: center;
    }
    .stepper button:hover { background: #222; color: #ccc; }
    .stepper .stepper-val { font-size: 11px; color: var(--accent); min-width: 28px; text-align: center; }

    /* ── CSS Variables for themes ── */
    :root {
      --accent: #00ff88;
      --accent-dim: rgba(0,255,136,0.1);
      --bg: #0c0c0c;
      --panel: #111;
      --border: #1a1a1a;
      --text: #c8c8c8;
      --dim: #444;
    }
    body.theme-cyber {
      --accent: #c084fc;
      --accent-dim: rgba(192,132,252,0.1);
      --bg: #0d0a14;
      --panel: #13101a;
      --border: #221a33;
      --text: #d4c8ee;
      --dim: #4a3d66;
    }
    body.theme-amber {
      --accent: #ffaa00;
      --accent-dim: rgba(255,170,0,0.1);
      --bg: #0c0a06;
      --panel: #12100a;
      --border: #2a2416;
      --text: #ccc0a0;
      --dim: #554d3a;
    }

    /* Apply theme variables everywhere */
    body { background: var(--bg); color: var(--text); }
    .auth-box { background: var(--panel); border-color: var(--border); }
    .auth-box h1 { color: var(--accent); }
    .auth-input { background: var(--bg); border-color: var(--border); color: var(--accent); }
    .auth-input:focus { border-color: var(--accent); }
    .term-header { background: var(--panel); border-color: var(--border); }
    .term-header .title { color: var(--accent); }
    .term-output::-webkit-scrollbar-track { background: var(--bg); }
    .badge-normal { background: var(--accent-dim); color: var(--accent); }
    .term-input-wrap { background: var(--panel); border-color: var(--border); }
    .prompt { color: var(--accent); }
    .term-input { color: var(--text); }
    .line-success { color: var(--accent); }
    .line-header { color: var(--accent); }
    .line-dim { color: var(--dim); }
    .ac-dropdown { background: var(--panel); border-color: var(--border); }
    .ac-item { border-color: var(--border); }
    .ac-item:hover, .ac-item.selected { background: color-mix(in srgb, var(--panel), white 5%); }
    .ac-item.selected { border-left-color: var(--accent); }
    .ac-cmd { color: var(--accent); }
    .ac-cat { background: var(--bg); border-color: var(--border); }
    .msg-item { background: var(--panel); border-color: var(--border); }
    .eval-table th { color: var(--accent); }
    .eval-table td { border-color: var(--border); }
    .settings-panel { background: var(--panel); border-color: var(--border); }
    .settings-header { border-color: var(--border); }
    .setting-row { border-color: color-mix(in srgb, var(--border), transparent 50%); }
  </style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>Eval Terminal</h1>
    <div class="sub">Royal Kat &amp; Kai Vault — Admin Access</div>
    <input type="password" id="auth-input" class="auth-input" placeholder="password" autocomplete="off" autofocus />
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- Terminal -->
<div id="terminal-screen">
  <div class="term-header">
    <span class="title">EVAL</span>
    <span class="sep">|</span>
    <span id="mode-badge" class="mode-badge badge-normal">COMMAND</span>
    <span class="sep">|</span>
    <span id="header-info" style="color:#444">type help for commands</span>
    <button class="settings-btn" onclick="toggleSettings()" title="Settings">&#9881;</button>
  </div>
  <div class="term-output" id="output"></div>
  <div class="term-input-wrap">
    <div class="ac-dropdown" id="ac-dropdown"></div>
    <div class="term-input-row">
      <span class="prompt" id="prompt">eval&gt;</span>
      <input type="text" class="term-input" id="cmd-input" placeholder="enter command..." autocomplete="off" spellcheck="false" />
    </div>
  </div>
</div>

<!-- Settings -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>Terminal Settings</h2>
      <button class="settings-close" onclick="toggleSettings()">&times;</button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-section-title">Theme</div>
        <div class="theme-grid">
          <div class="theme-card" data-theme="hacker" onclick="setTheme('hacker')">
            <div class="theme-card-preview" style="background:#0c0c0c;color:#00ff88">eval&gt;_</div>
            <div class="theme-card-name">Hacker</div>
          </div>
          <div class="theme-card" data-theme="cyber" onclick="setTheme('cyber')">
            <div class="theme-card-preview" style="background:#0d0a14;color:#c084fc">eval&gt;_</div>
            <div class="theme-card-name">Cyberpunk</div>
          </div>
          <div class="theme-card" data-theme="amber" onclick="setTheme('amber')">
            <div class="theme-card-preview" style="background:#0c0a06;color:#ffaa00">eval&gt;_</div>
            <div class="theme-card-name">Amber</div>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Display</div>
        <div class="setting-row">
          <span class="setting-label">Font Size</span>
          <div class="stepper">
            <button onclick="changeFontSize(-1)">-</button>
            <span class="stepper-val" id="font-size-val">12</span>
            <button onclick="changeFontSize(1)">+</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Timestamps</span>
          <div class="toggle" id="toggle-timestamps" onclick="toggleSetting('timestamps')"></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Autocomplete</span>
          <div class="toggle on" id="toggle-autocomplete" onclick="toggleSetting('autocomplete')"></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Sound Effects</span>
          <div class="toggle" id="toggle-sound" onclick="toggleSetting('sound')"></div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Behavior</div>
        <div class="setting-row">
          <span class="setting-label">Max Output Lines</span>
          <div class="stepper">
            <button onclick="changeMaxLines(-50)">-</button>
            <span class="stepper-val" id="max-lines-val">500</span>
            <button onclick="changeMaxLines(50)">+</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Confirm Destructive</span>
          <div class="toggle on" id="toggle-confirm" onclick="toggleSetting('confirm')"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const authScreen = document.getElementById('auth-screen');
const termScreen = document.getElementById('terminal-screen');
const authInput  = document.getElementById('auth-input');
const authErr    = document.getElementById('auth-err');
const output     = document.getElementById('output');
const cmdInput   = document.getElementById('cmd-input');
const modeBadge  = document.getElementById('mode-badge');
const headerInfo = document.getElementById('header-info');
const promptEl   = document.getElementById('prompt');
const acDropdown = document.getElementById('ac-dropdown');

let evalToken = null;
let mode = 'command';
let previewUser = null;
let cmdHistory = [];
let historyIdx = -1;
let acIdx = -1;

// ═══════════════════════════════════════════════════════════════════
// AUTOCOMPLETE COMMAND REGISTRY

// Browse mode commands (stealth read-only)
const BROWSE_COMMANDS = [
  { cmd: 'messages', desc: 'Show recent messages from this user', cat: 'Browse' },
  { cmd: 'messages 50', desc: 'Show last 50 messages from this user', cat: 'Browse' },
  { cmd: 'notes', desc: 'Show user notes', cat: 'Browse' },
  { cmd: 'vault', desc: 'Show user vault items', cat: 'Browse' },
  { cmd: 'contacts', desc: 'Show user contacts', cat: 'Browse' },
  { cmd: 'calendar', desc: 'Show user calendar events', cat: 'Browse' },
  { cmd: 'status', desc: 'Show presence/lastSeen/unread', cat: 'Browse' },
  { cmd: 'profile', desc: 'Show full profile data', cat: 'Browse' },
  { cmd: 'exit', desc: 'Exit browse mode', cat: 'Browse' },
];

function getMatchingCommands(input) {
  const list = mode === 'browse' ? [...BROWSE_COMMANDS, ...COMMANDS] : mode === 'preview' ? [...PREVIEW_COMMANDS, ...COMMANDS] : COMMANDS;
  if (!input) return list.slice(0, 15);
  const lower = input.toLowerCase();
  // Exact prefix match first, then fuzzy
  const exact = list.filter(c => c.cmd.toLowerCase().startsWith(lower));
  const fuzzy = list.filter(c => !c.cmd.toLowerCase().startsWith(lower) && c.cmd.toLowerCase().includes(lower));
  return [...exact, ...fuzzy].slice(0, 12);
}

function renderAutocomplete(input) {
  const matches = getMatchingCommands(input);
  if (!matches.length || (matches.length === 1 && matches[0].cmd.trim() === input.trim())) {
    acDropdown.classList.remove('open');
    return;
  }
  acDropdown.innerHTML = '';
  let lastCat = '';
  matches.forEach((m, i) => {
    if (m.cat !== lastCat) {
      lastCat = m.cat;
      const catDiv = document.createElement('div');
      catDiv.className = 'ac-cat';
      catDiv.textContent = m.cat;
      acDropdown.appendChild(catDiv);
    }
    const item = document.createElement('div');
    item.className = 'ac-item' + (i === acIdx ? ' selected' : '');
    item.innerHTML = `<span class="ac-cmd">${esc(m.cmd)}</span><span class="ac-desc">${esc(m.desc)}</span>`;
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      cmdInput.value = m.cmd;
      cmdInput.focus();
      acDropdown.classList.remove('open');
      acIdx = -1;
      // If command ends with space, keep cursor for typing args
      if (!m.cmd.endsWith(' ')) cmdInput.setSelectionRange(m.cmd.length, m.cmd.length);
    });
    acDropdown.appendChild(item);
  });
  acDropdown.classList.add('open');
  // Scroll selected into view
  const sel = acDropdown.querySelector('.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

// ── Auth ──
authInput.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const pw = authInput.value.trim();
  if (!pw) return;
  authErr.textContent = '';
  try {
    const r = await fetch('/api/eval/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const d = await r.json();
    if (!r.ok) { authErr.textContent = d.error || 'Access denied'; authInput.value = ''; return; }
    evalToken = d.token;
    authScreen.style.display = 'none';
    termScreen.style.display = 'flex';
    cmdInput.focus();
    print('Eval terminal ready. Type help for commands, or start typing for autocomplete.', 'success');
    print('', '');
  } catch { authErr.textContent = 'Connection error'; }
});

// ── Command input with autocomplete ──
cmdInput.addEventListener('input', () => {
  acIdx = -1;
  renderAutocomplete(cmdInput.value);
});

cmdInput.addEventListener('focus', () => {
  if (!cmdInput.value) renderAutocomplete('');
});

cmdInput.addEventListener('blur', () => {
  setTimeout(() => acDropdown.classList.remove('open'), 150);
});

cmdInput.addEventListener('keydown', async e => {
  const isOpen = acDropdown.classList.contains('open');
  const items = acDropdown.querySelectorAll('.ac-item');

  // Tab to accept autocomplete
  if (e.key === 'Tab' && isOpen && items.length > 0) {
    e.preventDefault();
    const idx = acIdx >= 0 ? acIdx : 0;
    const match = getMatchingCommands(cmdInput.value);
    if (match[idx]) {
      cmdInput.value = match[idx].cmd;
      acDropdown.classList.remove('open');
      acIdx = -1;
    }
    return;
  }

  // Arrow up/down in autocomplete
  if (e.key === 'ArrowUp' && isOpen) {
    e.preventDefault();
    if (acIdx > 0) acIdx--;
    else if (acIdx === -1) acIdx = items.length - 1;
    renderAutocomplete(cmdInput.value);
    return;
  }
  if (e.key === 'ArrowDown' && isOpen) {
    e.preventDefault();
    if (acIdx < items.length - 1) acIdx++;
    renderAutocomplete(cmdInput.value);
    return;
  }

  // Arrow up/down for history (when dropdown closed)
  if (e.key === 'ArrowUp' && !isOpen) {
    e.preventDefault();
    if (historyIdx < cmdHistory.length - 1) { historyIdx++; cmdInput.value = cmdHistory[cmdHistory.length - 1 - historyIdx]; }
    return;
  }
  if (e.key === 'ArrowDown' && !isOpen) {
    e.preventDefault();
    if (historyIdx > 0) { historyIdx--; cmdInput.value = cmdHistory[cmdHistory.length - 1 - historyIdx]; }
    else { historyIdx = -1; cmdInput.value = ''; }
    return;
  }

  // Escape to close dropdown
  if (e.key === 'Escape') { acDropdown.classList.remove('open'); acIdx = -1; return; }

  // Enter to execute
  if (e.key !== 'Enter') return;

  // If autocomplete item selected, fill it instead of executing
  if (isOpen && acIdx >= 0) {
    const match = getMatchingCommands(cmdInput.value);
    if (match[acIdx] && match[acIdx].cmd.endsWith(' ')) {
      cmdInput.value = match[acIdx].cmd;
      acDropdown.classList.remove('open');
      acIdx = -1;
      return;
    }
  }

  acDropdown.classList.remove('open');
  acIdx = -1;

  const raw = cmdInput.value.trim();
  cmdInput.value = '';
  historyIdx = -1;
  if (!raw) return;
  cmdHistory.push(raw);
  print(`eval> ${raw}`, 'cmd');
  await execCommand(raw);
  output.scrollTop = output.scrollHeight;
});

// ── Output helpers ──
function print(text, cls = 'info') {
  const d = document.createElement('div');
  d.className = `line line-${cls}`;
  d.textContent = text;
  output.appendChild(d);
}

function printHTML(html) {
  const d = document.createElement('div');
  d.className = 'line';
  d.innerHTML = html;
  output.appendChild(d);
}

function printTable(headers, rows) {
  let html = '<table class="eval-table"><tr>';
  headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr>';
  rows.forEach(r => {
    html += '<tr>';
    r.forEach(c => html += `<td>${esc(String(c))}</td>`);
    html += '</tr>';
  });
  html += '</table>';
  printHTML(html);
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setMode(m, info) {
  mode = m;
  const badge = m === 'edit' ? 'badge-edit' : m === 'preview' ? 'badge-preview' : m === 'browse' ? 'badge-browse' : m === 'maintenance' ? 'badge-maint' : 'badge-normal';
  modeBadge.className = 'mode-badge ' + badge;
  modeBadge.textContent = m.toUpperCase();
  if (info) headerInfo.textContent = info;
  promptEl.textContent = m === 'edit' ? 'edit>' : m === 'preview' ? `${previewUser}>` : m === 'browse' ? `🔍${previewUser}>` : 'eval>';
}

// ── Execute command ──
async function execCommand(raw) {
  if (raw === 'clear' || raw === 'cls') { output.innerHTML = ''; return; }
  if (raw === 'help') { showHelp(); return; }
  if (raw === 'exit edit' || raw === 'exit preview' || raw === 'exit') {
    if (mode !== 'command') { setMode('command', 'type help for commands'); previewUser = null; print('Exited to command mode.', 'success'); }
    return;
  }

  try {
    const r = await fetch('/api/eval/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: evalToken, command: raw, mode, previewUser }),
    });
    const d = await r.json();
    if (!r.ok) { print(d.error || 'Error', 'error'); return; }
    if (d.reauth) { evalToken = null; authScreen.style.display = ''; termScreen.style.display = 'none'; return; }
    if (d.setMode) { setMode(d.setMode, d.modeInfo || ''); previewUser = d.previewUser || null; }
    if (d.lines) d.lines.forEach(l => print(l.text, l.cls || 'info'));
    if (d.table) printTable(d.table.headers, d.table.rows);
    if (d.messages) renderEditMessages(d.messages);
    if (d.html) printHTML(d.html);
  } catch (e) {
    print('Network error: ' + e.message, 'error');
  }
}

// ── Edit mode messages ──
function renderEditMessages(msgs) {
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg-item';
    const time = new Date(m.timestamp).toLocaleString();
    div.innerHTML = `
      <div style="flex:1">
        <span class="msg-sender ${m.sender}">${esc(m.sender)}</span>
        <span class="msg-meta">${time} | ${m.id.substring(0, 8)}</span>
        <div class="msg-text">${esc((m.text || '').substring(0, 200))}${m.text?.length > 200 ? '...' : ''}${m.files?.length ? ` [${m.files.length} file(s)]` : ''}${Object.keys(m.reactions||{}).length ? ` [${Object.keys(m.reactions).length} reaction(s)]` : ''}</div>
      </div>
    `;
    const btn = document.createElement('button');
    btn.className = 'msg-del-btn';
    btn.textContent = 'Delete';
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = '...';
      const r = await fetch('/api/eval/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: evalToken, command: `delete msg ${m.id}` }),
      });
      const d = await r.json();
      if (d.lines) d.lines.forEach(l => print(l.text, l.cls));
      if (r.ok) div.remove();
      else { btn.disabled = false; btn.textContent = 'Delete'; }
    };
    div.appendChild(btn);
    output.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════════
const settingsOverlay = document.getElementById('settings-overlay');

const evalSettings = {
  theme: 'hacker',
  fontSize: 12,
  timestamps: false,
  autocomplete: true,
  sound: false,
  maxLines: 500,
  confirm: true,
  ...JSON.parse(localStorage.getItem('evalSettings') || '{}'),
};

function saveSettings() {
  localStorage.setItem('evalSettings', JSON.stringify(evalSettings));
}

function toggleSettings() {
  settingsOverlay.classList.toggle('open');
  if (settingsOverlay.classList.contains('open')) refreshSettingsUI();
}

// Close on backdrop click
settingsOverlay.addEventListener('click', e => {
  if (e.target === settingsOverlay) toggleSettings();
});

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && settingsOverlay.classList.contains('open')) toggleSettings();
});

function refreshSettingsUI() {
  // Theme cards
  document.querySelectorAll('.theme-card').forEach(c => {
    c.classList.toggle('active', c.dataset.theme === evalSettings.theme);
  });
  // Font size
  document.getElementById('font-size-val').textContent = evalSettings.fontSize;
  // Toggles
  document.getElementById('toggle-timestamps').classList.toggle('on', evalSettings.timestamps);
  document.getElementById('toggle-autocomplete').classList.toggle('on', evalSettings.autocomplete);
  document.getElementById('toggle-sound').classList.toggle('on', evalSettings.sound);
  document.getElementById('toggle-confirm').classList.toggle('on', evalSettings.confirm);
  // Max lines
  document.getElementById('max-lines-val').textContent = evalSettings.maxLines;
}

function setTheme(theme) {
  evalSettings.theme = theme;
  saveSettings();
  applyTheme();
  refreshSettingsUI();
}

function applyTheme() {
  document.body.classList.remove('theme-hacker', 'theme-cyber', 'theme-amber');
  if (evalSettings.theme !== 'hacker') document.body.classList.add('theme-' + evalSettings.theme);
}

function changeFontSize(delta) {
  evalSettings.fontSize = Math.max(9, Math.min(18, evalSettings.fontSize + delta));
  saveSettings();
  applyFontSize();
  refreshSettingsUI();
}

function applyFontSize() {
  output.style.fontSize = evalSettings.fontSize + 'px';
  cmdInput.style.fontSize = evalSettings.fontSize + 'px';
  promptEl.style.fontSize = evalSettings.fontSize + 'px';
}

function toggleSetting(key) {
  evalSettings[key] = !evalSettings[key];
  saveSettings();
  refreshSettingsUI();
}

function changeMaxLines(delta) {
  evalSettings.maxLines = Math.max(100, Math.min(2000, evalSettings.maxLines + delta));
  saveSettings();
  refreshSettingsUI();
}

// Override print to add timestamps and enforce max lines
const _origPrint = print;
print = function(text, cls) {
  if (evalSettings.timestamps && text && cls !== 'cmd') {
    const now = new Date();
    const ts = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    text = `[${ts}] ${text}`;
  }
  _origPrint(text, cls);
  // Enforce max lines
  while (output.children.length > evalSettings.maxLines) {
    output.removeChild(output.firstChild);
  }
  // Sound
  if (evalSettings.sound && cls === 'cmd') playBeep();
};

// Override autocomplete to respect setting
const _origRenderAC = renderAutocomplete;
renderAutocomplete = function(input) {
  if (!evalSettings.autocomplete) { acDropdown.classList.remove('open'); return; }
  _origRenderAC(input);
};

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    gain.gain.value = 0.05;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.stop(ctx.currentTime + 0.08);
  } catch {}
}

// Apply saved settings on load
applyTheme();
applyFontSize();
