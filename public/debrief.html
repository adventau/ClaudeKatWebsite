<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Year: A Debrief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/debrief.css?v=25">
</head>
<body>

  <!-- Grain Overlay -->
  <svg class="grain-overlay" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)"/>
  </svg>

  <!-- Vinyl SVG Template -->
  <template id="vinyl-template">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="98" fill="#111" stroke="#333" stroke-width="1"/>
      <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="65" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="55" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="28" fill="#222"/>
      <circle cx="100" cy="100" r="4" fill="#111"/>
      <text x="100" y="95" text-anchor="middle" font-family="Space Mono, monospace" font-size="6" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">YEAR DEBRIEF</text>
      <text x="100" y="104" text-anchor="middle" font-family="Space Mono, monospace" font-size="5" fill="rgba(255,255,255,0.3)">FT. KALIPH &amp; KATHRINE</text>
      <text x="100" y="113" text-anchor="middle" font-family="Space Mono, monospace" font-size="4" fill="rgba(255,255,255,0.2)">2024–2025</text>
    </svg>
  </template>

  <!-- ==================== GATE SCREEN ==================== -->
  <div class="gate-screen" id="gate-screen">
    <div class="gate-bg"></div>
    <div class="gate-content">
      <div class="gate-vinyl vinyl-wrap vinyl-spinning" id="gate-vinyl"></div>
      <h1 class="gate-title">My Year: A Debrief</h1>
      <p class="gate-subtitle">ft. Kaliph & Kathrine · 2024–2025</p>
      <form class="gate-form" id="gate-form">
        <input type="password" class="gate-input" id="gate-password" placeholder="Enter access code" autocomplete="off">
        <button type="submit" class="gate-submit">Enter</button>
        <div class="gate-error" id="gate-error">Incorrect code.</div>
      </form>
    </div>
  </div>

  <!-- Gate Audio -->
  <audio id="gate-audio" loop preload="auto"></audio>

  <!-- Audio Toggle -->
  <div class="audio-toggle" id="audio-toggle" title="Toggle audio">
    <svg id="audio-icon-on" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11 5L6 9H2v6h4l5 4V5zm8.07.93a10 10 0 010 12.14M15.54 8.46a5 5 0 010 7.08"/></svg>
    <svg id="audio-icon-off" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5zm12 4l-4 4m0-4l4 4"/></svg>
  </div>
  <div class="audio-prompt" id="audio-prompt">Click to enable audio</div>

  <!-- Slide BG Audio -->
  <audio id="slide-audio" loop preload="auto"></audio>

  <!-- ==================== PRESENTATION ==================== -->
  <div class="presentation" id="presentation">

    <!-- Role Badge -->
    <div class="role-badge" id="role-badge"></div>

    <!-- Waiting Screen (viewer) -->
    <div class="waiting-screen" id="waiting-screen">
      <div class="waiting-vinyl vinyl-wrap vinyl-spinning" id="waiting-vinyl"></div>
      <div class="waiting-text">Waiting for presenter...</div>
    </div>

    <!-- Slides Container -->
    <div class="slides-container" id="slides-container">
      <!-- Slides are built dynamically by debrief.js -->
    </div>

    <!-- Dot Nav -->
    <div class="dot-nav" id="dot-nav"></div>

    <!-- Slide Counter -->
    <div class="slide-counter" id="slide-counter">01 / 19</div>

    <!-- Reveal Counter (presenter only) -->
    <div class="reveal-counter" id="reveal-counter">Step 0 / 0</div>

    <!-- Presenter Controls -->
    <div class="presenter-controls" id="presenter-controls">
      <button class="presenter-btn" id="btn-prev">← Prev</button>
      <button class="presenter-btn" id="btn-reveal">Reveal →</button>
      <button class="presenter-btn" id="btn-next">Next →</button>
    </div>
  </div>

  <!-- ==================== EDITOR TOOLBAR ==================== -->
  <div class="edit-toolbar" id="edit-toolbar">
    <span class="edit-toolbar-badge">EDITOR</span>
    <button class="edit-toolbar-btn" id="edit-prev">← Prev</button>
    <span class="edit-toolbar-slide-label" id="edit-slide-label">Slide 1 / 19</span>
    <button class="edit-toolbar-btn" id="edit-next">Next →</button>
    <button class="edit-toolbar-btn add-event-btn" id="add-event-btn" title="Add event slide to this month">+ Event Slide</button>
    <span class="edit-toolbar-spacer"></span>
    <button class="edit-toolbar-btn save-btn" id="edit-save">Save All</button>
    <button class="edit-toolbar-btn" id="edit-settings-btn">Settings</button>
  </div>

  <!-- Settings Drawer -->
  <div class="settings-drawer" id="settings-drawer">
    <div class="settings-section">
      <div class="settings-label">Gate Screen Song</div>
      <div class="settings-upload-row">
        <input type="text" class="settings-input" id="setting-gate-song-name" placeholder="Song name (e.g. Intro Theme)">
        <label class="settings-upload-btn">
          Upload Audio
          <input type="file" id="setting-gate-song-file" accept="audio/*" hidden>
        </label>
      </div>
      <div class="settings-upload-status" id="gate-song-status"></div>
    </div>
    <div class="settings-section">
      <label class="settings-toggle">
        <input type="checkbox" id="setting-grain" checked> Show grain texture
      </label>
    </div>
    <div class="settings-section">
      <div class="settings-label">Transition Speed (ms)</div>
      <input type="number" class="settings-input" id="setting-transition" value="450" min="100" max="2000" step="50">
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="confirm-modal-overlay" id="confirm-modal">
    <div class="confirm-modal">
      <p class="confirm-modal-text" id="confirm-modal-text">Are you sure?</p>
      <div class="confirm-modal-actions">
        <button class="confirm-modal-btn confirm-cancel" id="confirm-cancel">Cancel</button>
        <button class="confirm-modal-btn confirm-delete" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/debrief-data.js?v=18"></script>
  <script src="/js/debrief.js?v=25"></script>
</body>
</html>
