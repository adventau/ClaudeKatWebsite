<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Royal Kat & Kai Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&family=Josefin+Sans:wght@300;400&family=Space+Grotesk:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0612;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text: #e2d9f3;
      --muted: rgba(226,217,243,0.5);
      --accent: #7c3aed;
      --accent2: #3b82f6;
      --glow: rgba(124,58,237,0.4);
    }

    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Particle Canvas ────────────────────────────────────────────── */
    #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Screens ────────────────────────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: opacity 0.6s, transform 0.6s;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }

    /* ── Crown / Title ──────────────────────────────────────────────── */
    .vault-title {
      text-align: center; margin-bottom: 2rem;
    }
    .crown { font-size: 2.6rem; animation: float 3.5s ease-in-out infinite; display: block; margin-bottom: 0.6rem; }
    .vault-title h1 {
      font-family: 'Cinzel', serif; font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.12em; line-height: 1.35;
      filter: drop-shadow(0 2px 8px rgba(124,58,237,0.3));
    }
    .vault-title p {
      font-family: 'Inter', sans-serif;
      color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem;
      letter-spacing: 0.12em; text-transform: uppercase; font-weight: 400;
    }

    /* ── Glass Card ─────────────────────────────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 22px; padding: 2.2rem 2rem;
      width: 380px; max-width: 92vw;
      box-shadow: 0 0 80px var(--glow), 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: fadeUp 0.7s cubic-bezier(0.34,1.2,0.64,1) both;
      position: relative;
    }
    .glass::before {
      content: ''; position: absolute; inset: -1px; border-radius: 23px;
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(59,130,246,0.2), rgba(192,132,252,0.3));
      z-index: -1; opacity: 0; transition: opacity 0.4s;
    }
    .glass:focus-within::before { opacity: 1; }

    /* ── Input ──────────────────────────────────────────────────────── */
    .input-wrap {
      position: relative; margin-bottom: 1.2rem;
    }
    .input-wrap input {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 12px; padding: 0.9rem 3rem 0.9rem 1rem;
      color: var(--text); font-size: 1rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s;
      letter-spacing: 0.1em;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(124,58,237,0.3);
    }
    .input-wrap input::placeholder { color: var(--muted); letter-spacing: 0.05em; }
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.1rem; padding: 4px; transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text); }

    /* ── Submit button ──────────────────────────────────────────────── */
    .btn-submit {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      background-size: 200% 200%;
      border: none; border-radius: 12px; color: #fff;
      font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 600;
      cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, background-position 0.4s;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
      animation: fadeUp 0.7s cubic-bezier(0.34,1.2,0.64,1) 0.15s both;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(124,58,237,0.55); background-position: 100% 0; }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit.loading { opacity: 0.65; pointer-events: none; }

    /* ── Error ──────────────────────────────────────────────────────── */
    .error-msg {
      color: #f87171; font-size: 0.85rem; text-align: center;
      margin-top: 0.8rem; min-height: 1.2em; transition: opacity 0.3s;
    }
    .error-msg.hidden { opacity: 0; }

    /* ── Profile Select ─────────────────────────────────────────────── */
    .profile-grid {
      display: flex; gap: 1.8rem; flex-wrap: wrap; justify-content: center;
      padding: 1.5rem 1rem;
    }

    .profile-card {
      position: relative; width: 240px; height: 320px;
      border-radius: 22px; cursor: pointer; overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.4s, border-color 0.4s;
      animation: fadeUp 0.85s cubic-bezier(0.34,1.2,0.64,1) both;
      background: linear-gradient(160deg, #0a0a1a, #141428, #0a0a1a);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .profile-card:nth-child(2) { animation-delay: 0.12s; }

    /* Shared pseudo-element defaults */
    .profile-card::before, .profile-card::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      opacity: 0; transition: opacity 0.4s;
    }
    .profile-card::before { z-index: 3; }
    .profile-card::after  { z-index: 1; }

    .card-bg-particles { position: absolute; inset: 0; overflow: hidden; border-radius: 24px; }
    .card-glow {
      position: absolute; inset: -50%; opacity: 0; transition: opacity 0.4s;
      border-radius: 50%; filter: blur(40px);
    }
    .profile-card:hover .card-glow { opacity: 1; }

    .card-content {
      position: relative; z-index: 2; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .card-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin-bottom: 1.2rem;
      transition: transform 0.4s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.4s;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(124,58,237,0.4);
    }
    .card-name {
      font-size: 2rem; font-weight: 700; letter-spacing: 0.05em;
      margin-bottom: 0.4rem; transition: transform 0.3s, letter-spacing 0.3s;
      background: linear-gradient(135deg, #a78bfa, #c4b5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-theme-label {
      font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); margin-bottom: 1rem;
    }
    .card-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: rgba(255,255,255,0.5);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .card-enter-hint {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%) translateY(4px);
      font-size: 0.68rem; color: rgba(255,255,255,0.45);
      letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
    }
    .profile-card:hover .card-enter-hint { opacity: 1; transform: translateX(-50%) translateY(0); }
    .card-badge {
      position: absolute; top: 12px; right: 12px; z-index: 4;
      font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 4px;
      transition: color 0.3s, border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
      opacity: 0.7;
    }
    .profile-card:hover .card-badge { opacity: 1; }
    .card-circuit {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60px; z-index: 1;
      pointer-events: none; opacity: 0; transition: opacity 0.5s;
    }
    .profile-card:hover .card-circuit { opacity: 1; }

    /* ═══════════════════════════════════════════════════════════════════
       THEME-SPECIFIC CARD STYLES — each theme gets unique personality
       ═══════════════════════════════════════════════════════════════════ */

    /* ── T1: AVNT Purple (kaliph) — Cyber / Tech / Electric Blue ──── */
    .theme-kaliph {
      background: linear-gradient(160deg, #020818 0%, #0a1635 40%, #06102a 70%, #030b1c 100%);
      border-color: rgba(59,130,246,0.2);
    }
    .theme-kaliph:hover {
      transform: translateY(-12px) scale(1.03) rotateY(-2deg);
      box-shadow: 0 24px 60px rgba(59,130,246,0.5), 0 0 100px rgba(56,189,248,0.2), inset 0 1px 0 rgba(59,130,246,0.3);
      border-color: rgba(59,130,246,0.5);
    }
    .theme-kaliph::after {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(59,130,246,0.03) 2px, rgba(59,130,246,0.03) 4px);
    }
    .theme-kaliph:hover::after { opacity: 1; }
    .theme-kaliph::before {
      background: linear-gradient(45deg, transparent 20%, rgba(59,130,246,0.12) 45%, rgba(56,189,248,0.08) 55%, transparent 80%);
      transform: translateX(-100%) rotate(45deg); transition: none;
    }
    .theme-kaliph:hover::before { animation: shimmer-sweep 0.7s ease; }
    .theme-kaliph .card-glow { background: radial-gradient(circle, rgba(59,130,246,0.6) 0%, rgba(56,189,248,0.3) 30%, transparent 70%); }
    .theme-kaliph .card-avatar { background: linear-gradient(135deg, #2563eb, #3b82f6); border-color: rgba(59,130,246,0.5); box-shadow: 0 0 20px rgba(59,130,246,0.5); }
    .theme-kaliph:hover .card-avatar { transform: scale(1.12); box-shadow: 0 0 30px rgba(59,130,246,0.7), 0 0 60px rgba(56,189,248,0.3); }
    .theme-kaliph .card-name { font-family: 'Orbitron', monospace; font-size: 1.5rem; letter-spacing: 0.12em; background: linear-gradient(135deg, #60a5fa, #38bdf8); -webkit-background-clip: text; background-clip: text; }
    .theme-kaliph:hover .card-name { letter-spacing: 0.2em; transform: scale(1.05); }
    .theme-kaliph .card-theme-label { color: rgba(56,189,248,0.6); font-family: 'Space Grotesk', sans-serif; }
    .theme-kaliph .card-enter-hint { font-family: 'Space Grotesk', sans-serif; }
    .theme-kaliph .card-badge { font-family: 'Orbitron', monospace; color: rgba(56,189,248,0.7); border: 1px solid rgba(56,189,248,0.3); }
    .theme-kaliph:hover .card-badge { box-shadow: 0 0 12px rgba(56,189,248,0.3); }
    .theme-kaliph .card-circuit {
      background: linear-gradient(90deg, transparent 10%, rgba(59,130,246,0.12) 10%, rgba(59,130,246,0.12) 10.5%, transparent 10.5%,
        transparent 30%, rgba(59,130,246,0.08) 30%, rgba(59,130,246,0.08) 30.5%, transparent 30.5%,
        transparent 60%, rgba(59,130,246,0.1) 60%, rgba(59,130,246,0.1) 60.5%, transparent 60.5%,
        transparent 85%, rgba(59,130,246,0.06) 85%, rgba(59,130,246,0.06) 85.5%, transparent 85.5%);
    }
    .theme-kaliph .ripple { background: rgba(59,130,246,0.25); }

    /* ── T2: Royal Violet (kathrine) — Elegant / Rose / Bloom ──────── */
    .theme-kathrine {
      background: linear-gradient(160deg, #1a0616 0%, #2d1028 35%, #1f0a2a 65%, #150520 100%);
      border-color: rgba(236,72,153,0.15);
    }
    .theme-kathrine:hover {
      transform: translateY(-10px) scale(1.04);
      box-shadow: 0 20px 60px rgba(236,72,153,0.4), 0 0 120px rgba(244,114,182,0.15), 0 0 200px rgba(192,132,252,0.08);
      border-color: rgba(236,72,153,0.45);
    }
    .theme-kathrine::before {
      background: radial-gradient(ellipse at 30% 50%, rgba(244,114,182,0.12) 0%, transparent 60%);
    }
    .theme-kathrine:hover::before { opacity: 1; animation: bloom-pulse 1.8s ease-in-out infinite; }
    .theme-kathrine::after {
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(244,114,182,0.7), transparent),
        radial-gradient(1px 1px at 70% 60%, rgba(192,132,252,0.5), transparent),
        radial-gradient(1px 1px at 50% 80%, rgba(244,114,182,0.6), transparent),
        radial-gradient(1.5px 1.5px at 35% 55%, rgba(251,191,36,0.4), transparent),
        radial-gradient(1px 1px at 80% 25%, rgba(192,132,252,0.5), transparent),
        radial-gradient(1px 1px at 15% 75%, rgba(244,114,182,0.4), transparent);
      background-size: 100% 100%;
    }
    .theme-kathrine:hover::after { opacity: 1; animation: sparkle-drift 3s ease-in-out infinite; }
    .theme-kathrine .card-glow { background: radial-gradient(circle, rgba(244,114,182,0.5) 0%, rgba(236,72,153,0.3) 30%, transparent 70%); filter: blur(50px); }
    .theme-kathrine .card-avatar { background: linear-gradient(135deg, #db2777, #ec4899); border-color: rgba(236,72,153,0.4); box-shadow: 0 0 20px rgba(236,72,153,0.5); }
    .theme-kathrine:hover .card-avatar { transform: scale(1.1) rotate(3deg); box-shadow: 0 0 30px rgba(236,72,153,0.7), 0 0 60px rgba(244,114,182,0.25); }
    .theme-kathrine .card-name { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; font-style: italic; background: linear-gradient(135deg, #f9a8d4, #f472b6, #e879f9); -webkit-background-clip: text; background-clip: text; }
    .theme-kathrine:hover .card-name { transform: scale(1.08); }
    .theme-kathrine .card-theme-label { color: rgba(244,114,182,0.6); font-family: 'Cormorant Garamond', serif; font-style: italic; }
    .theme-kathrine .card-enter-hint { font-family: 'Cormorant Garamond', serif; letter-spacing: 0.18em; }
    .theme-kathrine .card-badge { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.65rem; color: rgba(244,114,182,0.7); border: none; }
    .theme-kathrine .ripple { background: rgba(244,114,182,0.2); }

    /* ── T3: Crimson Royal — Deep Red / Gold / Regal ───────────────── */
    .theme-royal {
      background: linear-gradient(160deg, #1a0a04 0%, #2d1308 35%, #1f0c04 65%, #120602 100%);
      border-color: rgba(220,120,20,0.2);
    }
    .theme-royal:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 20px 60px rgba(217,119,6,0.4), 0 0 100px rgba(245,158,11,0.15), inset 0 1px 0 rgba(245,158,11,0.2);
      border-color: rgba(245,158,11,0.4);
    }
    .theme-royal::before {
      background: linear-gradient(180deg, transparent 0%, rgba(245,158,11,0.06) 50%, transparent 100%);
    }
    .theme-royal:hover::before { opacity: 1; animation: royal-flame 2s ease-in-out infinite; }
    .theme-royal::after {
      background: linear-gradient(0deg, rgba(217,119,6,0.08) 0%, transparent 40%);
    }
    .theme-royal:hover::after { opacity: 1; }
    .theme-royal .card-glow { background: radial-gradient(circle, rgba(245,158,11,0.5) 0%, rgba(217,119,6,0.25) 35%, transparent 70%); }
    .theme-royal .card-avatar { background: linear-gradient(135deg, #b45309, #d97706); border-color: rgba(245,158,11,0.5); box-shadow: 0 0 20px rgba(217,119,6,0.5); }
    .theme-royal:hover .card-avatar { transform: scale(1.1); box-shadow: 0 0 30px rgba(245,158,11,0.7), 0 0 50px rgba(217,119,6,0.3); }
    .theme-royal .card-name { font-family: 'Cinzel', serif; font-size: 1.7rem; background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706); -webkit-background-clip: text; background-clip: text; }
    .theme-royal:hover .card-name { transform: scale(1.06); }
    .theme-royal .card-theme-label { color: rgba(245,158,11,0.6); font-family: 'Cinzel', serif; }
    .theme-royal .card-enter-hint { font-family: 'Cinzel', serif; }
    .theme-royal .card-badge { font-family: 'Cinzel', serif; color: rgba(245,158,11,0.7); border: 1px solid rgba(245,158,11,0.25); }
    .theme-royal:hover .card-badge { box-shadow: 0 0 10px rgba(245,158,11,0.2); }
    .theme-royal .ripple { background: rgba(245,158,11,0.2); }

    /* ── T4: Pristine Light — Modern / Warm-Neutral / Clean ─────────── */
    .theme-light {
      background: linear-gradient(160deg, #f5f5f5 0%, #fafafa 40%, #f0f0f0 70%, #e8e8e8 100%);
      border-color: rgba(0,0,0,0.1);
    }
    .theme-light .card-content, .theme-light .card-status { color: #6b6b6b; }
    .theme-light:hover {
      transform: translateY(-10px) scale(1.04);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.08);
      border-color: rgba(0,0,0,0.2);
    }
    .theme-light::before {
      background: linear-gradient(45deg, transparent 30%, rgba(0,0,0,0.03) 50%, transparent 70%);
      transform: translateX(-100%) rotate(45deg); transition: none;
    }
    .theme-light:hover::before { animation: shimmer-sweep 0.8s ease; }
    .theme-light::after { background: none; }
    .theme-light .card-glow { background: radial-gradient(circle, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.03) 40%, transparent 70%); }
    .theme-light .card-avatar { background: #1a1a1a; border-color: rgba(0,0,0,0.15); box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    .theme-light:hover .card-avatar { transform: scale(1.1); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .theme-light .card-name { font-family: 'Inter', sans-serif; font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #0d0d0d, #4a4a4a); -webkit-background-clip: text; background-clip: text; }
    .theme-light:hover .card-name { transform: scale(1.06); }
    .theme-light .card-theme-label { color: #9b9b9b; font-family: 'Inter', sans-serif; }
    .theme-light .card-enter-hint { color: #b0b0b0; font-family: 'Inter', sans-serif; }
    .theme-light .card-badge { font-family: 'Inter', sans-serif; color: #6b6b6b; border: 1px solid rgba(0,0,0,0.12); }
    .theme-light .ripple { background: rgba(0,0,0,0.08); }

    /* ── T5: Midnight Dark — Modern / Warm-Dark / Refined ───────────── */
    .theme-dark {
      background: linear-gradient(160deg, #1a1a1a 0%, #212121 40%, #1e1e1e 70%, #151515 100%);
      border-color: rgba(255,255,255,0.08);
    }
    .theme-dark:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.18);
    }
    .theme-dark::before {
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.02) 50%, transparent 70%);
      transform: translateX(-100%) rotate(45deg); transition: none;
    }
    .theme-dark:hover::before { animation: shimmer-sweep 0.8s ease; }
    .theme-dark::after { background: none; }
    .theme-dark .card-glow { background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 40%, transparent 70%); }
    .theme-dark .card-avatar { background: #e8e8e8; border-color: rgba(255,255,255,0.15); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .theme-dark:hover .card-avatar { transform: scale(1.1); box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 40px rgba(255,255,255,0.05); }
    .theme-dark .card-name { font-family: 'Inter', sans-serif; font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #ffffff, #b0b0b0); -webkit-background-clip: text; background-clip: text; }
    .theme-dark:hover .card-name { transform: scale(1.05); }
    .theme-dark .card-theme-label { color: rgba(255,255,255,0.35); font-family: 'Inter', sans-serif; }
    .theme-dark .card-enter-hint { font-family: 'Inter', sans-serif; }
    .theme-dark .card-badge { font-family: 'Inter', sans-serif; color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.1); }
    .theme-dark .ripple { background: rgba(255,255,255,0.1); }

    /* ── T6: Celestial Heaven — Gold / Warm / Divine ────────────────── */
    .theme-heaven {
      background: linear-gradient(160deg, #12100a 0%, #1a1608 35%, #15120a 65%, #0e0c06 100%);
      border-color: rgba(200,169,110,0.2);
    }
    .theme-heaven:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 60px rgba(200,169,110,0.35), 0 0 120px rgba(232,213,163,0.1);
      border-color: rgba(200,169,110,0.45);
    }
    .theme-heaven::before {
      background: radial-gradient(ellipse at 50% 0%, rgba(232,213,163,0.1) 0%, transparent 60%);
    }
    .theme-heaven:hover::before { opacity: 1; animation: halo-glow 2.5s ease-in-out infinite; }
    .theme-heaven::after {
      background-image:
        radial-gradient(1px 1px at 25% 20%, rgba(232,213,163,0.5), transparent),
        radial-gradient(1.5px 1.5px at 75% 35%, rgba(200,169,110,0.4), transparent),
        radial-gradient(1px 1px at 50% 70%, rgba(232,213,163,0.3), transparent),
        radial-gradient(1px 1px at 15% 60%, rgba(251,191,36,0.3), transparent),
        radial-gradient(1px 1px at 85% 80%, rgba(200,169,110,0.35), transparent);
      background-size: 100% 100%;
    }
    .theme-heaven:hover::after { opacity: 1; animation: sparkle-drift 4s ease-in-out infinite; }
    .theme-heaven .card-glow { background: radial-gradient(circle, rgba(232,213,163,0.4) 0%, rgba(200,169,110,0.2) 35%, transparent 70%); filter: blur(45px); }
    .theme-heaven .card-avatar { background: linear-gradient(135deg, #b8952e, #c8a96e); border-color: rgba(200,169,110,0.5); box-shadow: 0 0 20px rgba(200,169,110,0.45); }
    .theme-heaven:hover .card-avatar { transform: scale(1.08); box-shadow: 0 0 28px rgba(232,213,163,0.6), 0 0 50px rgba(200,169,110,0.25); }
    .theme-heaven .card-name { font-family: 'Cinzel', serif; font-size: 1.8rem; background: linear-gradient(135deg, #e8d5a3, #c8a96e, #dcc47e); -webkit-background-clip: text; background-clip: text; }
    .theme-heaven:hover .card-name { transform: scale(1.06); }
    .theme-heaven .card-theme-label { color: rgba(200,169,110,0.6); font-family: 'Cinzel', serif; }
    .theme-heaven .card-enter-hint { font-family: 'Cinzel', serif; }
    .theme-heaven .card-badge { font-family: 'Cinzel', serif; color: rgba(200,169,110,0.65); border: 1px solid rgba(200,169,110,0.25); }
    .theme-heaven .ripple { background: rgba(200,169,110,0.2); }

    /* ── T7: Rosewood — "Rose & Ember" — Warm rose-gold on charcoal ── */
    .theme-rosewood {
      background: linear-gradient(145deg, #0c0912 0%, #1a0f14 50%, #0c0912 100%);
      border-color: rgba(200,150,120,0.2);
    }
    .theme-rosewood:hover {
      border-color: rgba(200,150,122,0.45);
      box-shadow: 0 12px 50px rgba(200,150,122,0.25), 0 0 30px rgba(200,150,122,0.1);
    }
    .theme-rosewood::before {
      content: ''; position: absolute; inset: 0; z-index: 3; border-radius: inherit; overflow: hidden;
      background: linear-gradient(135deg, transparent, rgba(200,150,122,0.2), transparent); opacity: 0;
    }
    .theme-rosewood:hover::before { opacity: 1; animation: bloom-pulse 1.8s ease-in-out infinite; }
    .theme-rosewood::after {
      content: ''; position: absolute; inset: 0; z-index: 1; border-radius: inherit;
      background: radial-gradient(circle at 30% 70%, rgba(200,150,122,0.15) 0%, transparent 60%); opacity: 0;
    }
    .theme-rosewood:hover::after { opacity: 1; }
    .theme-rosewood .card-glow { background: radial-gradient(circle, rgba(200,150,122,0.45) 0%, rgba(232,201,160,0.2) 35%, transparent 70%); }
    .theme-rosewood .card-avatar { background: linear-gradient(135deg, #a07058, #c8967a); border-color: rgba(200,150,122,0.5); box-shadow: 0 0 20px rgba(200,150,122,0.45); }
    .theme-rosewood:hover .card-avatar { transform: scale(1.1) rotate(-2deg); box-shadow: 0 0 30px rgba(200,150,122,0.6), 0 0 55px rgba(232,201,160,0.2); }
    .theme-rosewood .card-name { font-family: 'Cinzel', serif; font-size: 1.8rem; background: linear-gradient(135deg, #e8c9a0, #c8967a, #dbb99a); -webkit-background-clip: text; background-clip: text; }
    .theme-rosewood:hover .card-name { transform: scale(1.06); }
    .theme-rosewood .card-theme-label { color: rgba(200,150,122,0.6); font-family: 'Cinzel', serif; }
    .theme-rosewood .card-enter-hint { font-family: 'Cinzel', serif; }
    .theme-rosewood .card-badge { font-family: 'Cinzel', serif; color: rgba(200,150,122,0.65); border: 1px solid rgba(200,150,122,0.25); }
    .theme-rosewood .ripple { background: rgba(200,150,122,0.2); }

    /* ── T8: Ocean — "Deep Tide" — Teal-emerald on near-black ──────── */
    .theme-ocean {
      background: linear-gradient(145deg, #060d10 0%, #0a1a1e 50%, #060d10 100%);
      border-color: rgba(20,184,166,0.2);
    }
    .theme-ocean:hover {
      border-color: rgba(20,184,166,0.45);
      box-shadow: 0 12px 50px rgba(20,184,166,0.2), 0 0 30px rgba(20,184,166,0.08);
    }
    .theme-ocean::before {
      content: ''; position: absolute; inset: 0; z-index: 3; border-radius: inherit; overflow: hidden;
      background: linear-gradient(135deg, transparent, rgba(20,184,166,0.15), transparent); opacity: 0;
    }
    .theme-ocean:hover::before { opacity: 1; animation: shimmer-sweep 0.8s ease; }
    .theme-ocean::after {
      content: ''; position: absolute; inset: 0; z-index: 1; border-radius: inherit;
      background: radial-gradient(circle at 60% 80%, rgba(45,212,191,0.12) 0%, transparent 60%); opacity: 0;
    }
    .theme-ocean:hover::after { opacity: 1; }
    .theme-ocean .card-glow { background: radial-gradient(circle, rgba(20,184,166,0.45) 0%, rgba(45,212,191,0.2) 35%, transparent 70%); }
    .theme-ocean .card-avatar { background: linear-gradient(135deg, #0d9488, #14b8a6); border-color: rgba(20,184,166,0.5); box-shadow: 0 0 20px rgba(20,184,166,0.45); }
    .theme-ocean:hover .card-avatar { transform: scale(1.1); box-shadow: 0 0 30px rgba(20,184,166,0.6), 0 0 55px rgba(45,212,191,0.2); }
    .theme-ocean .card-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #5eead4, #2dd4bf, #14b8a6); -webkit-background-clip: text; background-clip: text; }
    .theme-ocean:hover .card-name { transform: scale(1.05); }
    .theme-ocean .card-theme-label { color: rgba(20,184,166,0.6); font-family: 'Space Grotesk', sans-serif; }
    .theme-ocean .card-enter-hint { font-family: 'Space Grotesk', sans-serif; }
    .theme-ocean .card-badge { font-family: 'Space Grotesk', sans-serif; color: rgba(20,184,166,0.6); border: 1px solid rgba(20,184,166,0.2); }
    .theme-ocean .ripple { background: rgba(20,184,166,0.2); }

    /* ── T9: Forest — "Enchanted Forest" — Deep emerald & gold, mystical woodland ── */
    .theme-forest {
      background: linear-gradient(160deg, #0a1510 0%, #132a1e 30%, #0f1a14 60%, #0d1810 100%);
      border-color: rgba(92,184,138,0.2);
      overflow: visible;
    }
    .theme-forest:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow:
        0 20px 60px rgba(92,184,138,0.3),
        0 0 80px rgba(92,184,138,0.1),
        0 0 120px rgba(200,168,78,0.06),
        inset 0 1px 0 rgba(200,168,78,0.15);
      border-color: rgba(92,184,138,0.45);
    }
    /* Mossy vine glow overlay */
    .theme-forest::before {
      background: radial-gradient(ellipse at 50% 100%, rgba(92,184,138,0.15) 0%, transparent 60%);
    }
    .theme-forest:hover::before { opacity: 1; animation: forest-card-breathe 2.5s ease-in-out infinite; }
    /* Firefly dots on card */
    .theme-forest::after {
      background-image:
        radial-gradient(2px 2px at 18% 22%, rgba(200,168,78,0.8), transparent),
        radial-gradient(1.5px 1.5px at 75% 35%, rgba(200,168,78,0.7), transparent),
        radial-gradient(2px 2px at 40% 70%, rgba(200,168,78,0.6), transparent),
        radial-gradient(1.5px 1.5px at 85% 65%, rgba(92,184,138,0.5), transparent),
        radial-gradient(2px 2px at 25% 85%, rgba(200,168,78,0.7), transparent),
        radial-gradient(1px 1px at 60% 15%, rgba(92,184,138,0.6), transparent),
        radial-gradient(1.5px 1.5px at 50% 50%, rgba(200,168,78,0.5), transparent);
      background-size: 100% 100%;
    }
    .theme-forest:hover::after { opacity: 1; animation: forest-firefly-dance 4s ease-in-out infinite; }
    .theme-forest .card-glow { background: radial-gradient(circle, rgba(92,184,138,0.4) 0%, rgba(200,168,78,0.15) 40%, transparent 70%); filter: blur(45px); }
    .theme-forest .card-avatar {
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      border-color: rgba(92,184,138,0.5);
      box-shadow: 0 0 20px rgba(92,184,138,0.45), 0 0 40px rgba(200,168,78,0.1);
    }
    .theme-forest:hover .card-avatar {
      transform: scale(1.12);
      box-shadow: 0 0 30px rgba(92,184,138,0.7), 0 0 60px rgba(200,168,78,0.2), 0 0 80px rgba(92,184,138,0.15);
    }
    .theme-forest .card-name {
      font-family: 'Crimson Pro', serif;
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, #95d5b2, #c8a84e, #52b788);
      -webkit-background-clip: text; background-clip: text;
    }
    .theme-forest:hover .card-name { transform: scale(1.06); }
    .theme-forest .card-theme-label { color: rgba(200,168,78,0.6); font-family: 'Crimson Pro', serif; font-style: italic; }
    .theme-forest .card-enter-hint { font-family: 'Crimson Pro', serif; letter-spacing: 0.15em; }
    .theme-forest .card-badge { font-family: 'Crimson Pro', serif; font-size: 0.6rem; color: rgba(200,168,78,0.7); border: 1px solid rgba(200,168,78,0.25); }
    .theme-forest:hover .card-badge { box-shadow: 0 0 12px rgba(200,168,78,0.2); }
    .theme-forest .card-circuit {
      background:
        linear-gradient(90deg, transparent 10%, rgba(92,184,138,0.08) 10%, rgba(92,184,138,0.08) 11%, transparent 11%,
          transparent 35%, rgba(200,168,78,0.06) 35%, rgba(200,168,78,0.06) 36%, transparent 36%,
          transparent 60%, rgba(92,184,138,0.06) 60%, rgba(92,184,138,0.06) 61%, transparent 61%,
          transparent 85%, rgba(200,168,78,0.05) 85%, rgba(200,168,78,0.05) 86%, transparent 86%);
    }
    .theme-forest .ripple { background: rgba(92,184,138,0.2); }

    /* Floating CSS-drawn particles that drift off the card on hover */
    .theme-forest .card-bg-particles {
      overflow: visible;
    }
    /* CSS leaf shape — green teardrop that floats up-left */
    .theme-forest .card-bg-particles::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      top: 50%; left: 20%;
      background: rgba(92,184,138,0.7);
      border-radius: 0 50% 50% 50%;
      transform: rotate(45deg);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 6px rgba(92,184,138,0.4);
      transition: opacity 0.3s;
    }
    .theme-forest:hover .card-bg-particles::before {
      opacity: 1;
      animation: forest-leaf-rise-1 3s ease-out infinite;
    }
    /* CSS flower shape — golden dot with petal glow that floats up-right */
    .theme-forest .card-bg-particles::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      top: 40%; right: 15%;
      background: radial-gradient(circle, rgba(200,168,78,0.9) 30%, rgba(200,168,78,0.3) 60%, transparent 70%);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      box-shadow:
        -5px -3px 0 2px rgba(200,168,78,0.25),
        5px -3px 0 2px rgba(200,168,78,0.25),
        0px 5px 0 2px rgba(200,168,78,0.25),
        -4px 4px 0 2px rgba(200,168,78,0.2),
        4px 4px 0 2px rgba(200,168,78,0.2);
      transition: opacity 0.3s;
    }
    .theme-forest:hover .card-bg-particles::after {
      opacity: 1;
      animation: forest-leaf-rise-2 3.5s ease-out infinite 0.4s;
    }

    /* CSS butterfly — two wing shapes via box-shadows, flutters upward */
    .theme-forest:hover .card-circuit::before {
      content: '';
      position: absolute;
      width: 6px; height: 3px;
      bottom: 100%; left: 40%;
      background: rgba(92,184,138,0.8);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 6;
      box-shadow:
        -5px -2px 0 3px rgba(92,184,138,0.5),
        5px -2px 0 3px rgba(92,184,138,0.5),
        -4px 2px 0 2px rgba(200,168,78,0.4),
        4px 2px 0 2px rgba(200,168,78,0.4);
      animation: forest-butterfly-rise 4s ease-in-out infinite 0.8s;
    }
    /* CSS sparkle — 4-pointed star shape that rises */
    .theme-forest:hover .card-circuit::after {
      content: '';
      position: absolute;
      width: 4px; height: 4px;
      bottom: 100%; right: 25%;
      background: rgba(200,168,78,0.9);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 6;
      box-shadow:
        0 0 4px 2px rgba(200,168,78,0.6),
        0 -6px 0 -1px rgba(200,168,78,0.5),
        0 6px 0 -1px rgba(200,168,78,0.5),
        -6px 0 0 -1px rgba(200,168,78,0.5),
        6px 0 0 -1px rgba(200,168,78,0.5);
      animation: forest-sparkle-up 2.5s ease-out infinite 0.2s;
    }

    /* Forest card hover animations — CSS-drawn shapes */
    @keyframes forest-card-breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.01); }
    }
    @keyframes forest-firefly-dance {
      0%, 100% { background-position: 0% 0%; opacity: 0.8; }
      25% { background-position: 2% -2%; opacity: 1; }
      50% { background-position: -1% 1%; opacity: 0.6; }
      75% { background-position: 1% -1%; opacity: 0.9; }
    }
    @keyframes forest-leaf-rise-1 {
      0% { transform: translate(0, 0) rotate(45deg) scale(1); opacity: 0.8; }
      30% { transform: translate(-25px, -40px) rotate(20deg) scale(1.1); opacity: 1; }
      60% { transform: translate(-40px, -80px) rotate(-5deg) scale(0.9); opacity: 0.6; }
      100% { transform: translate(-20px, -130px) rotate(-30deg) scale(0.7); opacity: 0; }
    }
    @keyframes forest-leaf-rise-2 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
      25% { transform: translate(20px, -35px) scale(1.2); opacity: 1; }
      55% { transform: translate(35px, -75px) scale(0.9); opacity: 0.5; }
      100% { transform: translate(15px, -120px) scale(0.6); opacity: 0; }
    }
    @keyframes forest-butterfly-rise {
      0% { transform: translate(0, 0) scaleX(1); opacity: 0; }
      10% { opacity: 0.9; }
      25% { transform: translate(15px, -30px) scaleX(0.4); opacity: 1; }
      40% { transform: translate(-10px, -55px) scaleX(1); }
      55% { transform: translate(20px, -80px) scaleX(0.5); }
      70% { transform: translate(5px, -100px) scaleX(1); opacity: 0.6; }
      85% { transform: translate(-15px, -115px) scaleX(0.6); opacity: 0.3; }
      100% { transform: translate(10px, -135px) scaleX(1); opacity: 0; }
    }
    @keyframes forest-sparkle-up {
      0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
      20% { transform: translate(5px, -20px) scale(1.3); opacity: 1; }
      50% { transform: translate(-5px, -50px) scale(0.8); opacity: 0.7; }
      80% { transform: translate(8px, -80px) scale(1.1); opacity: 0.3; }
      100% { transform: translate(0, -100px) scale(0.5); opacity: 0; }
    }

    /* ── Select header ───────────────────────────────────────────────── */
    .select-header {
      text-align: center; margin-bottom: 1.5rem;
      animation: fadeUp 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
    }
    .select-header h2 {
      font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 600;
      color: rgba(226,217,243,0.55); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .select-header p { color: var(--muted); font-size: 0.8rem; margin-top: 0.3rem; }

    /* ── Animations ─────────────────────────────────────────────────── */
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer-sweep { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(200%) rotate(45deg); } }
    @keyframes bloom-pulse { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } }
    @keyframes sparkle-drift { 0%,100% { background-position: 0% 0%; opacity: 0.7; } 33% { background-position: 2% -3%; opacity: 1; } 66% { background-position: -1% 2%; opacity: 0.8; } }
    @keyframes royal-flame { 0%,100% { opacity: 0.5; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.05); } }
    @keyframes geo-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes halo-glow { 0%,100% { opacity: 0.5; transform: scale(1) translateY(0); } 50% { opacity: 1; transform: scale(1.03) translateY(-2px); } }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15);
      transform: scale(0); animation: ripple-anim 0.6s linear; pointer-events: none;
    }
    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- ── PASSWORD SCREEN ─────────────────────────────────────────────── -->
  <div id="pw-screen" class="screen">
    <div class="glass">
      <div class="vault-title">
        <span class="crown">👑</span>
        <h1>The Royal Kat<br>&amp; Kai Vault</h1>
        <p>Private &amp; Encrypted</p>
      </div>
      <div class="input-wrap">
        <input type="password" id="pw-input" placeholder="Enter vault password…" autocomplete="off" autofocus>
        <button class="eye-btn" id="eye-btn" title="Toggle visibility"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
      </div>
      <button class="btn-submit" id="pw-btn">Unlock Vault</button>
      <div class="error-msg hidden" id="pw-error">Incorrect password. Try again.</div>
    </div>
  </div>

  <!-- ── PROFILE SELECT SCREEN ────────────────────────────────────────── -->
  <div id="profile-screen" class="screen hidden">
    <div>
      <div class="select-header">
        <h2>Who are you?</h2>
        <p>Select your profile to enter the vault</p>
      </div>
      <div class="profile-grid">
        <!-- Kaliph -->
        <div class="profile-card" id="card-kaliph" data-profile="kaliph">
          <div class="card-bg-particles"></div>
          <div class="card-glow"></div>
          <div class="card-badge" id="kaliph-badge"></div>
          <div class="card-circuit"></div>
          <div class="card-content">
            <div class="card-avatar" id="kaliph-avatar">K</div>
            <div class="card-name">Kaliph</div>
            <div class="card-theme-label" id="kaliph-theme-label" style="display:none"></div>
            <div class="card-status">
              <span class="status-dot" id="kaliph-status-dot"></span>
              <span id="kaliph-status-text">Online</span>
            </div>
          </div>
          <div class="card-enter-hint">Click to enter →</div>
        </div>

        <!-- Kathrine -->
        <div class="profile-card" id="card-kathrine" data-profile="kathrine">
          <div class="card-bg-particles"></div>
          <div class="card-glow"></div>
          <div class="card-badge" id="kathrine-badge"></div>
          <div class="card-circuit"></div>
          <div class="card-content">
            <div class="card-avatar" id="kathrine-avatar">K</div>
            <div class="card-name">Kathrine</div>
            <div class="card-theme-label" id="kathrine-theme-label" style="display:none"></div>
            <div class="card-status">
              <span class="status-dot" id="kathrine-status-dot"></span>
              <span id="kathrine-status-text">Online</span>
            </div>
          </div>
          <div class="card-enter-hint">Click to enter →</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── PROFILE PASSCODE OVERLAY ────────────────────────────────────── -->
  <div id="passcode-overlay" style="
    position:fixed; inset:0; z-index:90;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(12px);
    display:none; align-items:center; justify-content:center;
  " onclick="if(event.target===this)closePasscodeOverlay()">
    <div id="passcode-card" style="
      background:rgba(15,10,30,0.95); border:1px solid rgba(124,58,237,0.3);
      border-radius:20px; padding:2.5rem 2rem; width:320px; text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
    ">
      <div style="font-size:2rem;margin-bottom:0.5rem"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
      <h3 style="color:#e8e0f0;margin-bottom:0.3rem;font-family:'Space Grotesk',sans-serif" id="passcode-title">Enter Passcode</h3>
      <p style="color:rgba(232,224,240,0.5);font-size:0.8rem;margin-bottom:1.5rem">This profile is locked with a PIN</p>
      <div style="display:flex;gap:10px;justify-content:center;margin-bottom:1.2rem" id="passcode-dots">
        <input type="password" id="passcode-digit-1" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" style="
          width:48px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;
          background:rgba(124,58,237,0.1);border:1.5px solid rgba(124,58,237,0.3);
          border-radius:12px;color:#e8e0f0;outline:none;letter-spacing:0;
          font-family:'Space Grotesk',sans-serif;
        " oninput="passcodeDigitInput(this,1)" onkeydown="passcodeDigitKeydown(event,1)">
        <input type="password" id="passcode-digit-2" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" style="
          width:48px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;
          background:rgba(124,58,237,0.1);border:1.5px solid rgba(124,58,237,0.3);
          border-radius:12px;color:#e8e0f0;outline:none;letter-spacing:0;
          font-family:'Space Grotesk',sans-serif;
        " oninput="passcodeDigitInput(this,2)" onkeydown="passcodeDigitKeydown(event,2)">
        <input type="password" id="passcode-digit-3" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" style="
          width:48px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;
          background:rgba(124,58,237,0.1);border:1.5px solid rgba(124,58,237,0.3);
          border-radius:12px;color:#e8e0f0;outline:none;letter-spacing:0;
          font-family:'Space Grotesk',sans-serif;
        " oninput="passcodeDigitInput(this,3)" onkeydown="passcodeDigitKeydown(event,3)">
        <input type="password" id="passcode-digit-4" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" style="
          width:48px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;
          background:rgba(124,58,237,0.1);border:1.5px solid rgba(124,58,237,0.3);
          border-radius:12px;color:#e8e0f0;outline:none;letter-spacing:0;
          font-family:'Space Grotesk',sans-serif;
        " oninput="passcodeDigitInput(this,4)" onkeydown="passcodeDigitKeydown(event,4)">
      </div>
      <div id="passcode-error" style="color:#ef4444;font-size:0.8rem;margin-bottom:1rem;min-height:1.2em"></div>
      <button id="passcode-unlock-btn" style="
        width:100%;padding:10px;border:none;border-radius:12px;cursor:pointer;
        background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;
        font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:600;
      " onclick="submitPasscode()">Unlock</button>
      <button style="
        width:100%;padding:8px;border:none;background:transparent;cursor:pointer;
        color:rgba(232,224,240,0.4);font-size:0.8rem;margin-top:0.5rem;
      " onclick="closePasscodeOverlay()">Cancel</button>
    </div>
  </div>

  <!-- ── TRANSITION OVERLAY ────────────────────────────────────────────── -->
  <div id="transition-overlay" style="
    position:fixed; inset:0; z-index:100;
    background:radial-gradient(circle, #7c3aed 0%, #0a0612 100%);
    opacity:0; pointer-events:none;
    transition: opacity 0.5s;
  "></div>

  <script>
    // ── Particle background ──────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W; this.y = Math.random() * H;
        this.r = Math.random() * 1.5 + 0.5;
        this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.3;
        this.a = Math.random(); this.da = (Math.random() - 0.5) * 0.005;
        const c = [[124,58,237],[59,130,246],[192,132,252]];
        this.color = c[Math.floor(Math.random() * c.length)];
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        this.a += this.da;
        if (this.a <= 0 || this.a >= 1) this.da *= -1;
        if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.a})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 120; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      // Draw lines between close particles
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 100) {
            ctx.strokeStyle = `rgba(124,58,237,${0.1 * (1 - dist/100)})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();

    // ── Eye toggle ──────────────────────────────────────────────────
    const pwInput = document.getElementById('pw-input');
    const eyeBtn  = document.getElementById('eye-btn');
    eyeBtn.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeBtn.innerHTML = show
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    });

    // ── Password submit ─────────────────────────────────────────────
    const pwBtn   = document.getElementById('pw-btn');
    const pwError = document.getElementById('pw-error');
    const pwScreen      = document.getElementById('pw-screen');
    const profileScreen = document.getElementById('profile-screen');

    async function tryPassword() {
      const pw = pwInput.value.trim();
      if (!pw) return shake(document.querySelector('.glass'));
      pwBtn.innerHTML = '<span class="spinner"></span>Unlocking…';
      pwBtn.classList.add('loading');
      pwError.classList.add('hidden');

      const r = await fetch('/api/auth/password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await r.json();
      pwBtn.innerHTML = 'Unlock Vault';
      pwBtn.classList.remove('loading');

      if (data.success) {
        if (data.isGuest) {
          // Store guest name and redirect
          sessionStorage.setItem('guestName', data.guestName);
          doTransition(() => window.location.href = '/guest');
        } else {
          // Show profile select
          pwScreen.classList.add('hidden');
          profileScreen.classList.remove('hidden');
          loadUserPreviews();
          loadProfileLocks();
        }
      } else {
        pwError.textContent = data.error || 'Incorrect password.';
        pwError.classList.remove('hidden');
        shake(document.querySelector('.glass'));
        pwInput.value = '';
        pwInput.focus();
      }
    }

    pwBtn.addEventListener('click', tryPassword);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPassword(); });

    // ── Load user data for profile cards ───────────────────────────
    // Theme badge labels
    const themeBadges = {
      kaliph:   'AVNT',
      kathrine: '♛ Royal',
      royal:    '⚔ Crimson',
      light:    '◇ Pristine',
      dark:     '◆ Midnight',
      heaven:   '✦ Celestial',
      rosewood: '✿ Rose & Ember',
      ocean:    '≋ Deep Tide',
      forest:   '🍄 Enchanted',
    };
    // Theme colors — used for passcode overlay styling
    const themeColors = {
      kaliph:   { bg: '#0d0820', accent: '#7c3aed', accent2: '#a78bfa', glow: 'rgba(124,58,237,0.3)', border: 'rgba(124,58,237,0.25)' },
      kathrine: { bg: '#0d0716', accent: '#8b5cf6', accent2: '#c084fc', glow: 'rgba(139,92,246,0.3)', border: 'rgba(139,92,246,0.25)' },
      royal:    { bg: '#0a0703', accent: '#d97706', accent2: '#f59e0b', glow: 'rgba(217,119,6,0.3)', border: 'rgba(180,120,30,0.4)' },
      light:    { bg: '#e8e8e8', accent: '#0d0d0d', accent2: '#6b6b6b', glow: 'rgba(0,0,0,0.08)', border: 'rgba(0,0,0,0.12)' },
      dark:     { bg: '#1a1a1a', accent: '#e8e8e8', accent2: '#a0a0a0', glow: 'rgba(255,255,255,0.06)', border: 'rgba(255,255,255,0.1)' },
      heaven:   { bg: '#15120a', accent: '#c8a96e', accent2: '#e8d5a3', glow: 'rgba(200,169,110,0.25)', border: 'rgba(200,169,110,0.35)' },
      rosewood: { bg: '#0c0912', accent: '#c8967a', accent2: '#e8c9a0', glow: 'rgba(200,150,122,0.22)', border: 'rgba(200,150,120,0.18)' },
      ocean:    { bg: '#060d10', accent: '#14b8a6', accent2: '#2dd4bf', glow: 'rgba(20,184,166,0.25)', border: 'rgba(20,184,166,0.2)' },
      forest:   { bg: '#0f1a14', accent: '#52b788', accent2: '#c8a84e', glow: 'rgba(92,184,138,0.25)', border: 'rgba(92,184,138,0.2)' },
    };

    async function loadUserPreviews() {
      try {
        const r = await fetch('/api/users');
        const users = await r.json();
        window._cachedUsers = users;

        ['kaliph', 'kathrine'].forEach(name => {
          const u = users[name];
          if (!u) return;
          const card = document.getElementById('card-' + name);
          const theme = u.theme || 'dark';

          // Apply the theme class — this controls ALL visual styling
          // Remove any existing theme class first
          card.className = card.className.replace(/\btheme-\w+/g, '').trim();
          card.classList.add('profile-card', 'theme-' + theme);

          // Set the badge text based on theme
          const badge = document.getElementById(name + '-badge');
          if (badge) badge.textContent = themeBadges[theme] || theme;

          // Avatar
          if (u.avatar) {
            document.getElementById(name + '-avatar').innerHTML = `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
          }

          // Status text: show custom status if set, otherwise just presence
          const label = document.getElementById(name + '-theme-label');
          label.textContent = u.customStatus || '';
          label.style.display = u.customStatus ? '' : 'none';

          // Presence — use _presence from server: 'online' | 'idle' | 'offline'
          var presence = u._presence || 'offline';
          if (presence === 'online') {
            document.getElementById(name + '-status-dot').style.background = getStatusColor('online');
            document.getElementById(name + '-status-dot').style.boxShadow = '0 0 8px ' + getStatusColor('online');
            document.getElementById(name + '-status-text').textContent = 'Online';
          } else if (presence === 'idle') {
            document.getElementById(name + '-status-dot').style.background = getStatusColor('idle');
            document.getElementById(name + '-status-dot').style.boxShadow = '0 0 8px ' + getStatusColor('idle');
            document.getElementById(name + '-status-text').textContent = 'Idle';
          } else if (u.lastSeen) {
            document.getElementById(name + '-status-dot').style.background = getStatusColor('invisible');
            document.getElementById(name + '-status-dot').style.boxShadow = '0 0 8px ' + getStatusColor('invisible');
            document.getElementById(name + '-status-text').textContent = formatLastSeen(u.lastSeen);
          } else {
            document.getElementById(name + '-status-dot').style.background = getStatusColor('invisible');
            document.getElementById(name + '-status-dot').style.boxShadow = '0 0 8px ' + getStatusColor('invisible');
            document.getElementById(name + '-status-text').textContent = 'Offline';
          }
        });
      } catch {}
    }
    function getStatusColor(s) {
      return { online:'#22c55e', idle:'#f59e0b', dnd:'#ef4444', invisible:'#6b7280' }[s] || '#22c55e';
    }
    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
    function formatLastSeen(ts) {
      if (!ts) return 'Offline';
      var date = new Date(ts);
      var now = new Date();
      var diff = now - ts;
      var mins = Math.floor(diff / 60000);
      var time = date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (mins < 1) return 'Last seen just now';
      if (mins < 60) return 'Last seen ' + mins + 'm ago';
      if (date.toDateString() === now.toDateString()) return 'Last seen today at ' + time;
      var yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
      if (date.toDateString() === yesterday.toDateString()) return 'Last seen yesterday at ' + time;
      var dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
      return 'Last seen ' + dateStr + ' at ' + time;
    }

    // ── Profile passcode state ──────────────────────────────────────
    let profileLocks = {};
    let pendingProfile = null;

    async function loadProfileLocks() {
      try {
        profileLocks = await fetch('/api/auth/profile-locks').then(r => r.json());
        // Show lock icons on locked profiles
        if (profileLocks.kaliph) document.getElementById('card-kaliph').querySelector('.card-enter-hint').textContent = '🔒 Locked';
        if (profileLocks.kathrine) document.getElementById('card-kathrine').querySelector('.card-enter-hint').textContent = '🔒 Locked';
      } catch {}
    }
    function openPasscodeOverlay(profile) {
      pendingProfile = profile;
      const name = capitalize(profile);
      document.getElementById('passcode-title').textContent = name + ' — Enter PIN';
      document.getElementById('passcode-error').textContent = '';
      for (let i = 1; i <= 4; i++) document.getElementById('passcode-digit-' + i).value = '';

      // Theme the lock screen to match the profile's personal theme
      const users = window._cachedUsers || {};
      const userThemeId = users[profile]?.theme || 'dark';
      const theme = themeColors[userThemeId] || themeColors.dark;
      const card = document.getElementById('passcode-card');
      const btn = document.getElementById('passcode-unlock-btn');
      const isLight = theme.textDark;
      const textColor = isLight ? '#1e293b' : '#e8e0f0';
      const subtextColor = isLight ? 'rgba(30,41,59,0.5)' : 'rgba(232,224,240,0.5)';

      card.style.background = isLight
        ? `linear-gradient(135deg, ${theme.bg}, ${theme.accent}15)`
        : `linear-gradient(135deg, ${theme.bg}, ${theme.accent}22)`;
      card.style.borderColor = theme.border;
      document.getElementById('passcode-title').style.color = textColor;
      card.querySelector('p').style.color = subtextColor;
      btn.style.background = `linear-gradient(135deg, ${theme.accent}, ${theme.accent}cc)`;
      btn.style.color = isLight ? '#fff' : '#fff';

      document.querySelectorAll('.pin-digit').forEach(d => {
        d.style.background = `${theme.accent}15`;
        d.style.borderColor = `${theme.accent}4d`;
        d.style.color = textColor;
      });

      document.getElementById('passcode-overlay').style.display = 'flex';
      setTimeout(() => document.getElementById('passcode-digit-1').focus(), 100);
    }

    function closePasscodeOverlay() {
      document.getElementById('passcode-overlay').style.display = 'none';
      pendingProfile = null;
    }

    function passcodeDigitInput(el, idx) {
      el.value = el.value.replace(/\D/g, '').slice(0, 1);
      if (el.value && idx < 4) {
        document.getElementById('passcode-digit-' + (idx + 1)).focus();
      }
      // Auto-submit when all 4 digits entered
      if (idx === 4 && el.value) {
        const code = [1,2,3,4].map(i => document.getElementById('passcode-digit-' + i).value).join('');
        if (code.length === 4) submitPasscode();
      }
    }

    function passcodeDigitKeydown(e, idx) {
      if (e.key === 'Backspace' && !e.target.value && idx > 1) {
        document.getElementById('passcode-digit-' + (idx - 1)).focus();
      }
    }

    async function submitPasscode() {
      const code = [1,2,3,4].map(i => document.getElementById('passcode-digit-' + i).value).join('');
      if (code.length !== 4) {
        document.getElementById('passcode-error').textContent = 'Enter all 4 digits';
        return;
      }
      const r = await fetch('/api/auth/profile', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profile: pendingProfile, passcode: code })
      });
      const data = await r.json();
      if (data.success) {
        closePasscodeOverlay();
        const overlay = document.getElementById('transition-overlay');
        overlay.style.background = pendingProfile === 'kaliph'
          ? 'radial-gradient(circle, #7c3aed 0%, #0a0612 100%)'
          : 'radial-gradient(circle, #8b5cf6 0%, #0a0612 100%)';
        doTransition(() => window.location.href = '/app');
      } else {
        document.getElementById('passcode-error').textContent = data.error || 'Incorrect passcode';
        // Shake the inputs
        const dots = document.getElementById('passcode-dots');
        dots.style.animation = 'shake 0.4s ease';
        dots.addEventListener('animationend', () => dots.style.animation = '', { once: true });
        for (let i = 1; i <= 4; i++) document.getElementById('passcode-digit-' + i).value = '';
        document.getElementById('passcode-digit-1').focus();
      }
    }

    // ── Profile card click ──────────────────────────────────────────
    document.querySelectorAll('.profile-card').forEach(card => {
      card.addEventListener('click', async function(e) {
        addRipple(this, e);
        const profile = this.dataset.profile;

        // Check if profile has a passcode
        if (profileLocks[profile]) {
          openPasscodeOverlay(profile);
          return;
        }

        // Choose overlay color by profile
        const overlay = document.getElementById('transition-overlay');
        overlay.style.background = profile === 'kaliph'
          ? 'radial-gradient(circle, #7c3aed 0%, #0a0612 100%)'
          : 'radial-gradient(circle, #8b5cf6 0%, #0a0612 100%)';

        const r = await fetch('/api/auth/profile', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ profile })
        });
        const data = await r.json();
        if (data.success) {
          doTransition(() => window.location.href = '/app');
        }
      });
    });

    function doTransition(cb) {
      const overlay = document.getElementById('transition-overlay');
      overlay.style.opacity = '1';
      overlay.style.pointerEvents = 'all';
      setTimeout(cb, 500);
    }

    function addRipple(el, e) {
      const r = document.createElement('div');
      r.className = 'ripple';
      const rect = el.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      el.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    function shake(el) {
      el.style.animation = 'shake 0.4s ease';
      el.addEventListener('animationend', () => el.style.animation = '', { once: true });
    }
  </script>
  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-8px); }
      40%,80% { transform: translateX(8px); }
    }
  </style>
</body>
</html>
