<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Naomi's Bingo Card</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: #FBF5FF; min-height: 100dvh; padding: 16px 12px 32px; }
  .container { max-width: 520px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 18px 14px 20px; border: 2px solid #D8B4F8; box-shadow: 0 4px 24px rgba(155, 89, 208, 0.10); }
  h1 { font-family: 'Pacifico', cursive; color: #9B59D0; font-size: clamp(1.4rem, 5.5vw, 2rem); text-align: center; margin-bottom: 2px; font-weight: 400; }
  .subtitle { text-align: center; color: #B88AD8; font-size: 0.85rem; margin-bottom: 14px; }
  .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 4px; }
  .bingo-header span { background: #9B59D0; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: clamp(1rem, 4.5vw, 1.5rem); text-align: center; padding: 6px 0; border-radius: 10px 10px 0 0; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .cell {
    background: #fff; border: 2px solid #D8B4F8; border-radius: 10px; padding: 6px 4px;
    display: flex; align-items: center; justify-content: center; text-align: center;
    font-size: clamp(0.55rem, 2.3vw, 0.78rem); font-weight: 600; color: #4a2d6a;
    min-height: 64px; cursor: pointer; transition: all 0.15s ease;
    word-break: break-word; line-height: 1.25; user-select: none;
  }
  .cell:active { transform: scale(0.95); }
  .cell.marked { background: #9B59D0; color: #fff; border-color: #9B59D0; transform: scale(1.03); font-weight: 700; }
  .cell.free { background: #9B59D0; color: #fff; border-color: #9B59D0; font-weight: 700; font-size: clamp(0.9rem, 3.5vw, 1.2rem); letter-spacing: 1px; cursor: default; }
  @media (hover: hover) { .cell:not(.marked):not(.free):hover { background: #F3E8FF; } }

  /* Announcement banner */
  .banner { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #9B59D0; color: #fff; text-align: center; padding: 14px 16px; font-weight: 700; font-size: 1.1rem; transform: translateY(-100%); opacity: 0; transition: all 0.4s ease; }
  .banner.show { transform: translateY(0); opacity: 1; }
  .counter { position: fixed; top: 0; left: 0; right: 0; z-index: 99; background: #6B2FA0; color: #E8D4F8; text-align: center; padding: 8px 16px; font-size: 0.85rem; font-weight: 600; transform: translateY(-100%); opacity: 0; transition: all 0.4s ease; }
  .counter.show { transform: translateY(0); opacity: 1; }
  .counter.pushed { top: 50px; }
</style>
</head>
<body>
<div class="banner" id="banner"></div>
<div class="counter" id="counter"></div>
<div class="container">
  <h1>Naomi's Bingo Card &#x1F49C;</h1>
  <p class="subtitle">Back to School &middot; Monday</p>
  <div class="bingo-header"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
  <div class="grid" id="grid"></div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const USER = 'naomi';
let squares = [], marked = [];
const grid = document.getElementById('grid');
const banner = document.getElementById('banner');
const counter = document.getElementById('counter');
let bannerTimeout = null;

function render() {
  grid.innerHTML = '';
  squares.forEach((text, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (i === 12 ? ' free' : marked[i] ? ' marked' : '');
    cell.textContent = text;
    if (i !== 12) cell.addEventListener('click', () => toggleMark(i));
    grid.appendChild(cell);
  });
}

async function toggleMark(i) {
  const newVal = !marked[i];
  marked[i] = newVal;
  render();
  try {
    const r = await fetch('/api/bingo/mark', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: USER, index: i, marked: newVal })
    });
    const data = await r.json();
    if (data.marked) { marked = data.marked; render(); }
    updateCounter(data.kaliphCount, data.naomiCount);
  } catch (e) { console.error(e); }
}

function showBanner(text) {
  banner.textContent = text;
  banner.classList.add('show');
  counter.classList.add('pushed');
  clearTimeout(bannerTimeout);
  bannerTimeout = setTimeout(() => { banner.classList.remove('show'); counter.classList.remove('pushed'); }, 4000);
}

function updateCounter(kc, nc) {
  if (kc > 0 || nc > 0) {
    const parts = [];
    if (kc > 0) parts.push('Kaliph: ' + kc + (kc === 1 ? ' bingo' : ' bingos'));
    if (nc > 0) parts.push('Naomi: ' + nc + (nc === 1 ? ' bingo' : ' bingos'));
    counter.textContent = parts.join(' \u00b7 ');
    counter.classList.add('show');
  } else {
    counter.classList.remove('show');
  }
}

// Load initial state
fetch('/api/bingo/state/' + USER).then(r => r.json()).then(data => {
  squares = data.squares; marked = data.marked;
  render();
  updateCounter(data.kaliphCount, data.naomiCount);
});

// Socket.IO
const socket = io();
socket.on('bingo:state', data => {
  if (data.user === USER) { marked = data.marked; render(); }
  updateCounter(data.kaliphCount, data.naomiCount);
});
socket.on('bingo:hit', data => {
  const name = data.user === 'kaliph' ? 'Kaliph' : 'Naomi';
  showBanner('\u{1F389} ' + name + ' got a bingo!');
  updateCounter(data.kaliphCount, data.naomiCount);
});
</script>
</body>
</html>
